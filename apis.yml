        url: https://polygon.io/docs/options
    x-features:
      - OPRA-licensed options data
      - Snapshot and chain endpoints
      - Greeks and IV (paid tiers)
      - WebSocket streaming
    x-use-cases:
      - Options trading research
      - Volatility surface modeling
      - Greeks dashboards
