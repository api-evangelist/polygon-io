description: >-
  Polygon.io (rebranded as Massive in early 2026) provides real-time and
  historical market data APIs across stocks, options, indices, forex, crypto,
  and futures via REST, WebSocket streaming, and S3-style flat files. APIs
  cover trades, quotes, aggregates, snapshots, ticker reference data, and
  corporate actions.
apis:
  - aid: polygon-io:stocks-api
    name: Polygon.io Stocks API
    tags:
      - Stocks
      - Equities
      - Market Data
      - Real-time
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.polygon.io
    humanURL: https://polygon.io/docs/stocks
    description: >-
      Real-time and historical US equity market data including aggregates
      (minute/hour/day bars), trades, NBBO quotes, snapshots, ticker reference,
      splits, dividends, and financials. Available via REST and WebSocket.
    properties:
      - type: Documentation
        url: https://polygon.io/docs/stocks
    x-features:
      - Real-time and historical aggregates
      - NBBO trades and quotes
      - Snapshots and ticker reference
      - Corporate actions
      - WebSocket streaming
    x-use-cases:
      - Power equity charts and tickers
      - Backtest strategies on historical bars
      - Stream live trades into surveillance systems
